[package]
name = "ridge-term"
version = "0.1.0"
edition = "2021"
description = "A Rust terminal kernel (VT parser + grid + render backends) compiled to WebAssembly"
license = "MIT"

[package.metadata.wasm-pack]
wasm-opt = false

# Two-target crate. The `term` / `input` / `selection` / `search` modules
# are pure Rust (vte + unicode-segmentation) and compile cleanly on the
# host — `cargo check --lib` on x86_64-pc-windows-msvc passes today.
# The `render` module's submodules that actually touch web-sys / wgpu
# are gated with `#[cfg(all(target_arch = "wasm32", feature = "webgpu"))]`
# in `src/render/mod.rs`, so a native consumer never reaches them.
#
# P3 (2026-05-20): src-tauri/Cargo.toml will pick this crate up as
#   ridge-term = { path = "../packages/ridge-term", default-features = false }
# to get the parser + grid + modes without dragging wgpu / wasm-bindgen-
# futures / bytemuck into the Tauri binary. `default-features = false`
# strips the `webgpu` default feature (whose deps are all `optional =
# true` below); the remaining base dependencies (wasm-bindgen, js-sys,
# serde, serde-wasm-bindgen) compile to native no-ops via their wasm32
# cfg checks. Once the Tauri-side parser engine (P3.3) is wired the
# wasm bundle still gets its `feed(bytes)` entry point unchanged — the
# native consumer just imports the underlying `Terminal` directly.

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Default: ship the WebGpuBackend module so wasm bundles include the
# GPU path out of the box. The JS-side `RenderHandle.newWithWebgpuFirst`
# tries WebGPU at attach time and falls back to Canvas2D when the
# browser / GPU adapter is unavailable, so this is safe to enable for
# every target — Canvas2D remains the no-WebGPU fallback.
# (User feedback 2026-05-05: don't require a build flag or localStorage
# opt-in to use the GPU; runtime adapter detection should drive it.)
default = ["webgpu"]
# Round 3 §4.1: include the WebGpuBackend module + pull wgpu, bytemuck,
# wasm-bindgen-futures (for async adapter/device acquisition).
# wgpu's `webgpu` feature targets the browser's WebGPU API only —
# no native Vulkan/Metal/DX12 backends, keeping the wasm bundle
# minimal. wasm-bindgen-futures bridges JS Promises to Rust .await
# inside the WebGpuBackend::new constructor.
#
# The web-sys subfeatures (OffscreenCanvas + 2d ctx + ImageData) are
# only pulled when this feature is on — the §4.1.b glyph rasterizer
# uses an OffscreenCanvas to leverage the browser's font fallback
# chain instead of bundling a fontdue/cosmic-text crate (which would
# add 500 KB-5 MB to the wasm bundle plus require shipping a font).
webgpu = [
    "dep:wgpu",
    "dep:wasm-bindgen-futures",
    "dep:bytemuck",
    "web-sys/ImageData",
]

[dependencies]
# VT/ANSI escape sequence parser. Same crate Alacritty uses; covers the full
# Paul Williams state machine including DCS / OSC / CSI parameter parsing.
vte = "0.13"

# Extended grapheme cluster segmentation — needed by §4.7 emoji ZWJ
# support so multi-codepoint clusters (👨‍👩‍👧, 🏳️‍🌈, 👨‍💻) collapse
# into a single grid cell instead of fanning out across N cells per
# codepoint. Pure-Rust, no_std-compatible, ~50 KB compiled.
unicode-segmentation = "1.12"

wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"

# P3.5 (2026-05-20): binary serde codec for the GridDelta wire format.
# Target-agnostic (no_std + alloc), symmetric for src-tauri ↔ wasm.
# `default-features = false, features = ["alloc"]` keeps it wasm-friendly
# (no std::time / std::io). Typical 80×24 cursor-blink frame ~10 B on
# the wire vs ~3 KB JSON — drives most of the IPC bandwidth win.
postcard = { version = "1", default-features = false, features = ["alloc"] }

console_error_panic_hook = "0.1"

# Render backends use web-sys for Canvas2D / WebGPU types. The render
# module itself is gated on `target_arch = "wasm32"`, so native `cargo
# test --lib` skips compiling it — VT kernel tests still run on the host.
[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "OffscreenCanvas",
    "OffscreenCanvasRenderingContext2d",
    "TextMetrics",
    "CssStyleDeclaration",
    "Storage",
    "console",
] }

# Round 3 §4.1 — optional, only pulled when `--features webgpu` is set.
# wgpu's `webgpu` feature is the browser-WebGPU backend (no native
# Vulkan/Metal/DX12), keeping the wasm bundle as small as possible
# for a GPU-rendering crate. `default-features = false` prunes
# native-OS bits that wouldn't link in wasm32 anyway.
wgpu = { version = "23", default-features = false, features = ["webgpu", "wgsl"], optional = true }
# wasm-bindgen-futures lets WebGpuBackend::new use `.await` on the
# adapter / device request promises that wgpu returns through
# wasm-bindgen.
wasm-bindgen-futures = { version = "0.4", optional = true }
# bytemuck replaces two `unsafe transmute` blocks in webgpu.rs::end_frame
# (TASKS §4.5.c). The `derive` feature lets CellInstance + FrameUniform
# get `Pod` + `Zeroable` impls without hand-written unsafe blocks.
bytemuck = { version = "1", features = ["derive"], optional = true }

[dev-dependencies]
# Native tests don't need wasm. Naga is the WGSL parser/validator wgpu
# itself uses at runtime; pulling it as a host dev-dep lets us run a
# `#[cfg(test)]` smoke that statically validates `cell.wgsl` on every
# `cargo test --lib` — without spinning up a browser. Catches the kind
# of typo (missing semicolon, undeclared identifier, type mismatch in
# `select`/`mix`) that would otherwise only surface at WebGPU
# `device.create_shader_module` time in production.
naga = { version = "23", features = ["wgsl-in"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
