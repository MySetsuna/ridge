name: release

# 跨平台桌面发布：打 v* tag（或手动 workflow_dispatch）→ 在 windows / ubuntu /
# macOS 三个 runner 上各自跑 tauri build，产物上传到同一个 GitHub Release（草稿）。
# 校验无误后再把草稿改为正式发布。本仓构建链全在 tauri.conf 的 beforeBuildCommand /
# beforeBundleCommand 里（wasm + 前端 + remote + desktop-web + tmux shim + cli），
# tauri-action 会自动触发，无需在此重复。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（如 v0.0.9）'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64          # Apple Silicon 原生
            platform: macos-latest
            args: '--bundles app,dmg'
          - label: macos-x64            # Intel (x86_64)：在 arm64 runner 上交叉编译
            platform: macos-latest      # （macos-13 原生 Intel runner 已枯竭、长期排队拿不到机器）
            rust_target: x86_64-apple-darwin
            args: '--bundles app,dmg --target x86_64-apple-darwin --features vendored-openssl'
          - label: linux-x64
            platform: ubuntu-22.04
            args: '--bundles deb,appimage'
          - label: windows-x64
            platform: windows-latest
            args: '--bundles nsis,msi'
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    env:
      # 前端 vite 构建体量大（Monaco 等）。macOS arm64 runner 给 Node 的默认堆偏低，
      # 会在 SSR 打包时 OOM（heap out of memory）。统一抬高 old-space 上限，三平台一致。
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            build-essential curl wget file libssl-dev libxdo-dev pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Add cross Rust target (Intel macOS)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 代码签名 + 公证：要启用时，把 docs/release-signing.md 里的 APPLE_* env 块
          # 粘到这里并配好同名 secret。注意：**不要**留空写 APPLE_CERTIFICATE —— 空值会让
          # tauri-action 去 import 空证书、构建直接挂。没有证书就别加这些 env（现状=未签名包）。
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Ridge __VERSION__'
          releaseBody: |
            多主机「Hosts」侧边栏：统一「外部来源终端」抽象——本机无头会话 / 局域网远端 / rdg 远端主机各带来源徽标；右键「接入终端」+ dock 区域选择 + 拖拽停靠可把外部 pane 接入当前布局；远端主机注册表 + 连接对话框（凭据不落库）。
            智能体协同增强：MCP 自由交流寻址 + 接入引导 + 手动编组。
            公网远控丝滑化：改懒加载 scrollback（首屏自拉约 1.5 屏、滚顶分批拉历史，取代 host 全量回放）+ 桌面 in-browser 首屏预算收敛；cloud pane fan-out 引用计数——多控制端看同一 pane 不再互相断流；修快速重订阅竞态（desync 按 owning sub_id 精确移除）。
            终端修复：resize reflow 残留（delta 镜像发散 reflow）；前台有进程时禁用 shell-history 弹层并覆盖进程内命令（OSC 133;A）；teammate/auto_place 分屏白屏（建 pane fit 后补强制全量重绘）。

            产物：桌面安装包 Windows（.exe / .msi）、Linux（.deb / .AppImage）、macOS（.dmg，Apple Silicon + Intel 各一份，未签名）；命令行程序 rdg（Windows / Linux / macOS-arm64）。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 发布产物附带 rdg CLI：tauri.conf 的 beforeBundleCommand 已 `pnpm build:cli` 把
      # rdg 编到工作区根 target/release/。这里按平台重命名并上传到同一 Release（草稿）。
      # 交叉编译的 Intel macOS 条目（rust_target≠''）跳过——build:cli 只按 host(arm64)
      # 编、不会产出 x86_64 二进制，避免误标错架构。→ rdg 覆盖 win / linux / macos-arm64。
      - name: Upload rdg CLI to release
        if: matrix.rust_target == ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REL_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -e
          VER="${REL_TAG#v}"
          case "${{ matrix.label }}" in
            windows-x64) OS=windows; ARCH=x86_64;  EXT=.exe ;;
            linux-x64)   OS=linux;   ARCH=x86_64;  EXT= ;;
            macos-arm64) OS=macos;   ARCH=aarch64; EXT= ;;
            *) echo "label ${{ matrix.label }} 无需上传 rdg，跳过"; exit 0 ;;
          esac
          SRC=""
          for c in "target/release/rdg$EXT" "src-tauri/target/release/rdg$EXT"; do
            if [ -f "$c" ]; then SRC="$c"; break; fi
          done
          if [ -z "$SRC" ]; then
            echo "找不到 rdg 二进制（已查 target/release 与 src-tauri/target/release）" >&2
            exit 1
          fi
          DST="rdg-${VER}-${ARCH}-${OS}${EXT}"
          cp "$SRC" "$DST"
          gh release upload "$REL_TAG" "$DST" --clobber
          echo "已上传 $DST（源 $SRC）"

      # Linux 免费签名：用自管 GPG 私钥给 .deb / .AppImage 生成 detached 签名（.asc）并
      # 传到同一 Release。未配置 GPG_PRIVATE_KEY 时整步自跳过（现状 = 不签名，零影响）。
      # 配置：本地 `gpg --gen-key`，`gpg --armor --export-secret-keys <ID>` 存为仓库 secret
      # GPG_PRIVATE_KEY（有口令再加 GPG_PASSPHRASE）。校验：`gpg --verify x.deb.asc x.deb`。
      - name: GPG sign Linux artifacts (optional)
        if: matrix.label == 'linux-x64'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REL_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY 未配置，跳过 Linux 签名（产物仍正常发布，只是无 .asc）"
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons --keyid-format=long | awk -F: '/^sec/{print $5; exit}')
          shopt -s globstar nullglob
          signed=0
          for f in src-tauri/target/**/bundle/**/*.deb src-tauri/target/**/bundle/**/*.AppImage; do
            echo "signing $f"
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
                -u "$KEYID" --armor --detach-sign "$f"
            gh release upload "$REL_TAG" "$f.asc" --clobber
            signed=$((signed+1))
          done
          echo "signed $signed Linux artifact(s)"

      # Windows 免费签名（开源）：用 SignPath.io Foundation 的免费证书给 .exe / .msi 做
      # Authenticode 签名（消 SmartScreen 警告）。整组仅在仓库变量 SIGNPATH_ENABLED=true 时启用，
      # 未配置=不签名、零影响。注册与配置见 docs/release-signing.md。
      - name: Stage Windows artifacts for signing
        if: matrix.label == 'windows-x64' && vars.SIGNPATH_ENABLED == 'true'
        shell: bash
        run: |
          mkdir -p to-sign
          cp src-tauri/target/release/bundle/nsis/*.exe to-sign/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi  to-sign/ 2>/dev/null || true
          ls -la to-sign

      - name: Upload unsigned artifacts (SignPath input)
        if: matrix.label == 'windows-x64' && vars.SIGNPATH_ENABLED == 'true'
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned
          path: to-sign/

      - name: Sign with SignPath
        if: matrix.label == 'windows-x64' && vars.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Re-upload signed Windows artifacts to release
        if: matrix.label == 'windows-x64' && vars.SIGNPATH_ENABLED == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REL_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          shopt -s globstar nullglob
          n=0
          for f in signed/**/*.exe signed/**/*.msi signed/*.exe signed/*.msi; do
            gh release upload "$REL_TAG" "$f" --clobber && echo "re-uploaded signed $f" && n=$((n+1))
          done
          echo "re-uploaded $n signed Windows artifact(s)"
