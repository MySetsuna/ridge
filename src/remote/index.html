<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Ridge Remote</title>
<!-- PWA: installable, offline-capable, auto-updating (see vite.remote.config.js
     + src/remote/main.ts). The <link rel="manifest"> is injected at build time
     by vite-plugin-pwa. -->
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ridge">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
/* Bundled color-emoji font → Warp-level emoji incl. country flags on the
   remote too (matches the desktop; see src/lib/terminal/fontStack.ts for the
   shared stack ordering). Self-hosted COLRv1, served by the LAN host from
   /fonts/NotoColorEmoji.ttf (src/remote/public/fonts → static/remote/fonts).
   The terminal glyph rasterizer (Canvas2D fillText) picks it up once loaded. */
@font-face{
  font-family:'Noto Color Emoji';
  src:url('/fonts/NotoColorEmoji.ttf') format('truetype');
  font-display:swap;
}
/* Default --rg-* palette (GitHub-dark). The desktop's active theme is pushed
   over WS and overrides these via inline styles on <html> (applyThemeVars). */
:root{
  --rg-bg:#0d1117;--rg-surface:#161b22;--rg-surface-2:#21262d;
  --rg-border:#30363d;--rg-border-bright:#30363d;
  --rg-fg:#e6edf3;--rg-fg-muted:#8b949e;
  --rg-accent:#58a6ff;--rg-accent-glow:rgba(88,166,255,.15);
  --rg-ansi-green:#3fb950;--rg-ansi-red:#f85149;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--rg-bg);color:var(--rg-fg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;touch-action:manipulation;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div id="app"></div>
<script>
  // Preload the bundled color-emoji font so the terminal rasterizer uses it
  // before the first emoji is rasterized-and-cached (the controller also
  // re-fits on `document.fonts` loadingdone). Fire-and-forget.
  try { document.fonts && document.fonts.load('64px "Noto Color Emoji"', '🇯🇵😀👍'); } catch (e) {}
</script>
<script type="module" src="./main.ts"></script>
</body>
</html>
