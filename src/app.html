<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%sveltekit.assets%/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..600;1,14..32,400..600&family=JetBrains+Mono:ital,wght@0,400..600;1,400..600&display=swap"
    rel="stylesheet" />
  %sveltekit.head%
  <style>
    #brand-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--rg-bg, #071009);
      /* 动态使用主题色变量 */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #brand-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .animate-draw {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 2s ease-out forwards, breathe 2s ease-in-out infinite alternate;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    #brand-loader svg {
      width: 35vmin;
      height: 35vmin;
    }

    .animate-rect {
      stroke-dasharray: 108;
      stroke-dashoffset: 108;
      animation: draw-rect 0.6s ease-out forwards;
    }

    .animate-cross {
      stroke-dasharray: 25;
      stroke-dashoffset: 25;
      animation: draw-cross 0.6s ease-out forwards;
      animation-delay: 0.4s;
    }

    @keyframes draw-rect {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes draw-cross {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
  <script>
    // 预先应用主题配色
    (function() {
      const theme = localStorage.getItem('ridge-theme') || 'dark';
      const themes = {
        'sand': { accent: '#c69a4f', bg: '#1a1814' },
        'grass': { accent: '#6c9a3d', bg: '#0e120d' },
        'soil': { accent: '#d97757', bg: '#16110f' },
        'wheat': { accent: '#c8860c', bg: '#1a1711' },
        'starsky': { accent: '#4899ff', bg: '#0b1019' },
        'dark': { accent: '#7fb069', bg: '#071009' }
      };
      const config = themes[theme] || themes['dark'];
      const root = document.documentElement;
      root.style.setProperty('--startup-accent', config.accent);
      root.style.setProperty('--rg-bg', config.bg);
    })();
  </script>
</head>

<body data-sveltekit-preload-data="hover">
  <div id="brand-loader">
    <svg viewBox="-8 -8 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect class="animate-rect" x="2.5" y="2.5" width="27" height="27" rx="6" stroke="var(--startup-accent)"
        stroke-width="2"></rect>
      <line class="animate-cross" x1="16" y1="28.5" x2="16" y2="3.5" stroke="var(--startup-accent)" stroke-width="2">
      </line>
      <line class="animate-cross" x1="28.5" y1="16" x2="3.5" y2="16" stroke="var(--startup-accent)" stroke-width="2">
      </line>
      <rect x="4.5" y="4.5" width="9.5" height="9.5" rx="2" fill="var(--startup-accent)" fill-opacity="0.18"></rect>
      <rect x="18" y="18" width="9.5" height="9.5" rx="2" fill="var(--startup-accent)" fill-opacity="0.22"></rect>
    </svg>
  </div>

  <div style="display: contents">%sveltekit.body%</div>
  <script>
    window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('brand-loader').classList.add('fade-out');
        }, 1000); // 至少展示1秒
      });
  </script>
</body>

</html>
