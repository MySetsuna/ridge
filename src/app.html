<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%sveltekit.assets%/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..600;1,14..32,400..600&family=JetBrains+Mono:ital,wght@0,400..600;1,400..600&display=swap"
    rel="stylesheet" />
  %sveltekit.head%
  <style>
    #brand-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--rg-loader-bg, #071009);
      /* 独立使用加载器背景变量，避免污染全局 bg */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #brand-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .animate-draw {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 2s ease-out forwards, breathe 2s ease-in-out infinite alternate;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    #brand-loader svg {
      width: 35vmin;
      height: 35vmin;
    }

    .animate-rect {
      stroke-dasharray: 108;
      stroke-dashoffset: 108;
      animation: draw-rect 0.6s ease-out forwards;
    }

    .animate-cross {
      stroke-dasharray: 25;
      stroke-dashoffset: 25;
      animation: draw-cross 0.6s ease-out forwards;
      animation-delay: 0.4s;
    }

    @keyframes draw-rect {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes draw-cross {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
  <script>
    (function() {
      var themeId = 'endless-dark';
      try {
        var s = JSON.parse(localStorage.getItem('ridge-settings') || '{}');
        if (s.theme) themeId = s.theme;
      } catch(e) {}
      var primary = '#eeeeee';
      var secondary = '#888888';
      var bg = '#000000';
      try {
        var cache = JSON.parse(localStorage.getItem('ridge-theme-data') || '{}');
        if (cache.themes) {
          for (var i = 0; i < cache.themes.length; i++) {
            if (cache.themes[i].id === themeId) {
              var t = cache.themes[i];
              primary = t.loader.primary;
              secondary = t.loader.secondary;
              bg = t.colors.bg;
              break;
            }
          }
        }
      } catch(e) {}
      var root = document.documentElement;
      root.style.setProperty('--startup-accent', primary);
      root.style.setProperty('--startup-secondary', secondary);
      root.style.setProperty('--rg-loader-bg', bg);
    })();
  </script>
</head>

<body data-sveltekit-preload-data="hover">
  <div id="brand-loader" data-tauri-drag-region>
    <svg viewBox="-8 -8 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect class="animate-rect" x="2.5" y="2.5" width="27" height="27" rx="6" stroke="var(--startup-accent)"
        stroke-width="2"></rect>
      <line class="animate-cross" x1="16" y1="28.5" x2="16" y2="3.5" stroke="var(--startup-accent)" stroke-width="2">
      </line>
      <line class="animate-cross" x1="28.5" y1="16" x2="3.5" y2="16" stroke="var(--startup-accent)" stroke-width="2">
      </line>
      <rect x="4.5" y="4.5" width="9.5" height="9.5" rx="2" fill="var(--startup-accent)" fill-opacity="0.18"></rect>
      <rect x="18" y="18" width="9.5" height="9.5" rx="2" fill="var(--startup-secondary)" fill-opacity="0.30"></rect>
    </svg>
  </div>

  <div style="display: contents">%sveltekit.body%</div>
  <script>
    window.addEventListener('ridge:app-ready', () => {
      const el = document.getElementById('brand-loader');
      if (el) el.classList.add('fade-out');
    }, { once: true });
  </script>
</body>

</html>
