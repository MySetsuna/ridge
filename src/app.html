<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%sveltekit.assets%/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ridge</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; worker-src 'self' blob:; img-src 'self' asset: http://asset.localhost https://asset.localhost data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ipc: http://ipc.localhost https://ipc.localhost http://localhost:* https://localhost:* http://127.0.0.1:* https://127.0.0.1:* ws://localhost:* wss://localhost:* ws://127.0.0.1:* wss://127.0.0.1:* ws://*.localhost:* wss://*.localhost:* https://9527127.xyz https://*.9527127.xyz wss://9527127.xyz wss://*.9527127.xyz;">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..600;1,14..32,400..600&family=JetBrains+Mono:ital,wght@0,400..600;1,400..600&display=swap"
    rel="stylesheet" />
  <!-- Bundled color-emoji font → Warp-level emoji incl. country flags
       (Windows' Segoe UI Emoji has no flag glyphs). Self-hosted COLRv1
       (vector, crisp at any cell size); `font-src 'self'` in the CSP above
       already permits it. Declared HERE in the document head (not only in
       app.css) and kicked via the Font Loading API so the terminal's glyph
       rasterizer (Canvas2D `fillText`, see ridge-term glyph_rasterizer.rs)
       sees the face before the first emoji glyph is rasterized-and-cached. -->
  <style>
    @font-face {
      font-family: 'Noto Color Emoji';
      src: url('/fonts/NotoColorEmoji.ttf') format('truetype');
      font-display: swap;
    }
  </style>
  <script>
    // Fire-and-forget preload; the rasterizer's font stack lists "Noto Color
    // Emoji" ahead of the system emoji fonts, so once this resolves every
    // emoji (and flag) rasterizes from the bundled Noto.
    try { document.fonts && document.fonts.load('64px "Noto Color Emoji"', '🇯🇵😀👍'); } catch (e) {}
  </script>
  %sveltekit.head%
  <style>
    #brand-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--rg-loader-bg, #071009);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity var(--startup-fadeout-dur, 0.5s) ease-out;
    }

    #brand-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #brand-loader svg {
      width: 35vmin;
      height: 35vmin;
    }

    .animate-rect {
      stroke-dasharray: 108;
      stroke-dashoffset: 108;
      animation: draw-rect var(--startup-draw-dur, 0.6s) ease-out forwards;
    }

    .animate-cross {
      stroke-dasharray: 25;
      stroke-dashoffset: 25;
      animation: draw-cross var(--startup-draw-dur, 0.6s) ease-out forwards;
      animation-delay: var(--startup-cross-delay, 0.4s);
    }

    @keyframes draw-rect {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes draw-cross {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
  <script>
    // Splash theming bootstrap.
    //
    // Source of truth ordering:
    //   1) `window.__RIDGE_BOOT_LOADER__` — injected by Rust via
    //      `WebviewWindowBuilder::initialization_script` (see
    //      `src-tauri/src/commands/theme.rs::build_splash_init_script`).
    //      This is the ONLY source that's guaranteed to be correct on
    //      the FIRST launch — `localStorage.ridge-theme-data` is only
    //      populated by `initThemeSystem` after SvelteKit hydrates.
    //   2) `localStorage.ridge-theme-data` + `localStorage.ridge-settings`
    //      — fallback for the (unlikely) case where Rust failed to read
    //      `ridge.theme` or persist the active id.
    //   3) Hardcoded defaults baked into the CSS variable fallbacks.
    //
    // The animation styles above are entirely fallback-driven so any
    // field missing from a theme silently uses the current default. New
    // themes can override animation timing, stroke, fill opacities, etc.
    // without touching this file.
    (function() {
      var loader = null;
      var bg = null;
      var colors = null;
      // Priority order:
      //   1) localStorage `ridge-settings.theme` + `ridge-theme-data`
      //      — the user's MOST RECENT theme choice. `setTheme` writes
      //      these synchronously before kicking off the async Rust
      //      persistence, so they're always at least as fresh as the
      //      Rust-side `active_theme.json`. Prefer them whenever the
      //      cache contains the matching theme entry.
      //   2) Rust-injected `window.__RIDGE_BOOT_*` — set by
      //      `WebviewWindowBuilder::initialization_script` BEFORE any
      //      page script runs. Authoritative on FIRST launch (no
      //      localStorage yet) and a safety net when the localStorage
      //      cache is stale / partial.
      //   3) Hardcoded fallbacks below.
      try {
        var s = JSON.parse(localStorage.getItem('ridge-settings') || '{}');
        var themeId = (s && s.theme) || null;
        if (themeId) {
          var cache = JSON.parse(localStorage.getItem('ridge-theme-data') || '{}');
          if (cache && cache.themes) {
            for (var i = 0; i < cache.themes.length; i++) {
              if (cache.themes[i].id === themeId) {
                var t = cache.themes[i];
                loader = t.loader || {};
                colors = t.colors || null;
                bg = colors && colors.bg;
                break;
              }
            }
          }
        }
      } catch(e) {}
      if (!loader && window.__RIDGE_BOOT_LOADER__) {
        loader = window.__RIDGE_BOOT_LOADER__;
        bg = window.__RIDGE_BOOT_THEME_BG__ || null;
        colors = window.__RIDGE_BOOT_THEME_COLORS__ || null;
      }
      loader = loader || {};
      var root = document.documentElement;
      function setColor(name, value) {
        if (typeof value === 'string' && value.length > 0) {
          root.style.setProperty(name, value);
        }
      }
      function setLen(name, value, suffix) {
        if (typeof value === 'number' && isFinite(value)) {
          root.style.setProperty(name, value + suffix);
        } else if (typeof value === 'string' && value.length > 0) {
          root.style.setProperty(name, value);
        }
      }
      function setNum(name, value) {
        if (typeof value === 'number' && isFinite(value)) {
          root.style.setProperty(name, String(value));
        }
      }
      // Required: primary / secondary fall back to hardcoded greys so a
      // theme file with neither still renders something visible.
      setColor('--startup-accent', loader.primary || '#eeeeee');
      setColor('--startup-secondary', loader.secondary || '#888888');
      // Background: explicit loader.bg wins; else theme bg; else black.
      setColor('--rg-loader-bg', loader.bg || bg || '#000000');
      // Optional knobs — only written when the theme provides them, so
      // the @keyframes / .animate-* fallback values stay authoritative
      // for themes that don't opt in.
      setColor('--startup-accent-glow', loader.accentGlow);
      setLen('--startup-stroke', loader.strokeWidth, 'px');
      setLen('--startup-radius', loader.cornerRadius, 'px');
      setLen('--startup-draw-dur', loader.drawDurationMs, 'ms');
      setLen('--startup-breathe-dur', loader.breatheDurationMs, 'ms');
      setLen('--startup-cross-delay', loader.crossDelayMs, 'ms');
      setLen('--startup-fadeout-dur', loader.fadeOutDurationMs, 'ms');
      setNum('--startup-fill-opacity-primary', loader.fillOpacityPrimary);
      setNum('--startup-fill-opacity-secondary', loader.fillOpacitySecondary);
      // Apply the FULL theme palette (`--rg-bg`, `--rg-fg`, `--rg-accent`,
      // every `--rg-ansi-*`, etc.) to `:root` right here — before SvelteKit
      // hydrates, before any `<body>` paint, before the splash even starts
      // fading. Without this the chrome behind the splash sits at browser
      // defaults (white) until the SvelteKit onMount → initThemeSystem →
      // initSettingsBoot chain finishes; users see a flash of white when
      // the splash fades out faster than the SPA boot, especially in dev
      // mode where vite's module loading adds 100-300 ms of latency.
      // `settings.ts::applyTheme` writes the same vars later; this is the
      // first-write that the SPA may overwrite once it confirms the user's
      // theme choice — identical write is a no-op.
      if (colors && typeof colors === 'object') {
        for (var key in colors) {
          if (Object.prototype.hasOwnProperty.call(colors, key)) {
            setColor('--rg-' + key, colors[key]);
          }
        }
      }
    })();
  </script>
</head>

<body data-sveltekit-preload-data="hover">
  <div id="brand-loader" data-tauri-drag-region>
    <svg viewBox="-8 -8 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect class="animate-rect" x="2.5" y="2.5" width="27" height="27" rx="var(--startup-radius, 6)"
        stroke="var(--startup-accent)" stroke-width="var(--startup-stroke, 2)"
        fill="none" stroke-linecap="square" stroke-linejoin="miter"
        paint-order="stroke" style="filter: none"></rect>
      <line class="animate-cross" x1="16" y1="28.5" x2="16" y2="3.5" stroke="var(--startup-accent)"
        stroke-width="var(--startup-stroke, 2)" stroke-linecap="square" style="filter: none"></line>
      <line class="animate-cross" x1="28.5" y1="16" x2="3.5" y2="16" stroke="var(--startup-accent)"
        stroke-width="var(--startup-stroke, 2)" stroke-linecap="square" style="filter: none"></line>
      <rect x="4.5" y="4.5" width="9.5" height="9.5" rx="2" fill="var(--startup-accent)"
        fill-opacity="var(--startup-fill-opacity-primary, 0.18)"></rect>
      <!-- Second filled block is intentionally pinned to a fixed
           ink-green (墨绿) regardless of theme — gives the splash a
           consistent identity color even when the user is on a warm or
           neutral theme. -->
      <rect x="18" y="18" width="9.5" height="9.5" rx="2" fill="#2d5a3d"
        fill-opacity="var(--startup-fill-opacity-secondary, 1)"></rect>
    </svg>
  </div>

  <div style="display: contents">%sveltekit.body%</div>
  <script>
    function dismissBrandLoader() {
      const el = document.getElementById('brand-loader');
      if (!el || el.classList.contains('fade-out')) return;
      el.classList.add('fade-out');
      // Once the opacity transition lands the splash is invisible AND
      // `pointer-events: none`, but it still occupies its 100vw×100vh
      // box in the layout flow. Take it out of layout so the underlying
      // chrome is truly unobstructed — Playwright's click-actionability
      // check (and any host shortcut probing element-from-point) would
      // otherwise still treat the loader's box as a candidate.
      const onDone = () => { el.style.display = 'none'; };
      el.addEventListener('transitionend', onDone, { once: true });
      // Belt + suspenders: if the transitionend never fires (animation
      // disabled, reduced-motion, browser quirk) drop the box after a
      // generous animation budget so the SPA isn't permanently blocked.
      setTimeout(onDone, 800);
    }
    // Primary signal: the SvelteKit page dispatches `ridge:app-ready` after
    // it has either (a) attached its first pane via Tauri PTY or (b) hit
    // the 5 s fallback inside its own async IIFE. Either way dismiss.
    window.addEventListener('ridge:app-ready', dismissBrandLoader, { once: true });
    // Fallback for non-Tauri contexts (Playwright smoke tests against the
    // raw Vite dev server, future web preview, broken Tauri IPC). The
    // primary dispatcher lives inside the `if (!isTauri()) return;` branch
    // of +page.svelte's onMount, so without this 3 s safety net the
    // splash would stay full-viewport forever in browser mode and
    // intercept every click. 3 s gives the SPA hydration enough time to
    // mount the page chrome behind the loader before we fade — earlier
    // and the user catches a flash of un-styled content.
    setTimeout(dismissBrandLoader, 3000);
  </script>
</body>

</html>
